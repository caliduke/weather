<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DukeCast Weather</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <h1>DukeCast</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city..." autocomplete="off">
            <button id="searchBtn">Search</button>
            <button id="locationBtn" title="Use GPS">📍</button>
        </div>

        <div id="weatherDisplay" class="weather-card">
            <p>Ready for a forecast?</p>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('DukeCast SW Online'))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
