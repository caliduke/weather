<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Weather PWA</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        /* Ensuring the layout is clean even before style.css loads */
        .weather-card { min-height: 200px; margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>SkyCast</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button id="searchBtn">Search</button>
            <button id="locationBtn" title="Use GPS Location">📍</button>
        </div>

        <div id="weatherDisplay" class="weather-card">
            <p>Enter a city or use your location to begin.</p>
        </div>
    </div>

    <script src="./app.js"></script>
    
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.error('Service Worker Failed:', err));
            });
        }
    </script>
</body>
</html>
